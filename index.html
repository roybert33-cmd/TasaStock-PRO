    if(!/^[A-Z]{4}-\d{4}$/.test(licencia)) return false;
    let [base, num] = licencia.split('-');
    return FORMULA(base) === licencia;
  };
  const CSS = `
  #elix-activation-overlay{position:fixed;inset:0;z-index:999999;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;font-family:ui-sans-serif,system-ui;overflow-y:auto;transform:translateZ(0);-webkit-transform:translateZ(0)}
  #elix-activation-overlay *{box-sizing:border-box}
  .elix-logo-wrap{width:80px;height:80px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;user-select:none;cursor:pointer;transform:translateZ(0);-webkit-transform:translateZ(0)}
  .elix-title{color:#fff;font-size:32px;font-weight:800;margin-top:20px;letter-spacing:-1px}
  .elix-sub{color:#888;font-size:14px;letter-spacing:4px;margin-top:8px}
  .elix-card{background:#171717;border:1px solid #2a2a2a;border-radius:24px;padding:24px;width:100%;max-width:380px;margin-top:32px;transform:translateZ(0);-webkit-transform:translateZ(0);isolation:isolate;contain:paint;background-clip:padding-box}
  .elix-label{color:#888;font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:8px;display:block}
  .elix-input{width:100%;background:#0a0a0a;border:1.5px solid #333;border-radius:12px;padding:14px 16px;color:#fff;font-size:18px;letter-spacing:1px;text-transform:uppercase;outline:none}
  .elix-input:focus{border-color:#fff}
  .elix-btn{width:100%;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}
  .elix-btn-white{background:#fff;color:#000}
  .elix-btn-green{background:#22c55e;color:#000;display:flex;align-items:center;justify-content:center;gap:8px}
  .elix-foot{color:#555;font-size:11px;letter-spacing:1px;margin-top:16px;text-align:center;line-height:1.4}
  #elix-owner-modal{position:fixed;inset:0;z-index:1000000;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;padding:20px}
  #elix-owner-modal.open{display:flex}
  .elix-owner-card{background:#111;border:1px solid #333;border-radius:24px;padding:20px;width:100%;max-width:380px;transform:translateZ(0);-webkit-transform:translateZ(0);isolation:isolate;contain:paint}
  .elix-owner-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .elix-owner-icon{width:40px;height:40px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .elix-gen-box{background:#0a0a0a;border:1px solid #333;border-radius:16px;padding:16px;margin-top:16px}
  .elix-gen-code{font-size:32px;font-weight:900;color:#fff;letter-spacing:2px;margin:8px 0}
  /* FIX ANTI-GLITCH PARA TARJETAS POS */
  .product-card-fix{transform:translateZ(0);-webkit-transform:translateZ(0);backface-visibility:hidden;isolation:isolate;contain:paint;background-clip:padding-box;overflow:hidden}

  `;
  const style = document.createElement('style'); style.textContent = CSS; document.head.appendChild(style);

  function crearOverlay(){
    if(document.getElementById('elix-activation-overlay')) return;
    const div = document.createElement('div');
    div.id = 'elix-activation-overlay';
    div.innerHTML = `
      <div class="elix-logo-wrap" id="elix-logo-trigger"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="elix-title">TasaStock PRO</div>
      <div class="elix-sub">OFFLINE FIRST • 2026</div>
      <div class="elix-card">
        <div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:6px">Activación requerida</div>
        <div style="color:#aaa;font-size:14px;margin-bottom:16px;line-height:1.4">Ingresa tu código de licencia para usar la app sin conexión.</div>
        <label class="elix-label">CÓDIGO DE LICENCIA</label>
        <input id="elix-lic-input" class="elix-input" placeholder="BODE-XXXX" maxlength="9">
        <button id="elix-activar" class="elix-btn elix-btn-white">Activar App Ahora</button>
        <button id="elix-ws" class="elix-btn elix-btn-green">↗ Comprar licencia por WhatsApp</button>
        <div class="elix-foot">FORMATO: 4 LETRAS - 4 DÍGITOS<br>CHECKSUM</div>
      </div>
      <div style="margin-top:20px;color:#444;font-size:11px;letter-spacing:2px">TASASTOCK PRO • SECURE ACTIVATION</div>
    `;
    document.body.appendChild(div);
    document.getElementById('elix-activar').onclick = () => {
      let val = document.getElementById('elix-lic-input').value.toUpperCase().trim();
      if(VALIDAR(val)){
        localStorage.setItem('elix_license', val);
        div.remove();
      } else {
        alert('Código inválido. Ejemplo ROYB-0973. Fórmula sum*37+9281%10000');
      }
    };
    document.getElementById('elix-ws').onclick = () => {
      window.open('https://wa.me/56900000000?text=Hola%20quiero%20licencia%20TasaStock%20PRO','_blank');
    };
  }
  function crearOwnerModal(){
    if(document.getElementById('elix-owner-modal')) return;
    const m = document.createElement('div');
    m.id = 'elix-owner-modal';
    m.innerHTML = `
      <div class="elix-owner-card">
        <div class="elix-owner-head">
          <div class="elix-owner-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
          <div style="color:#fff;font-weight:800;flex:1">PANEL DEL DUEÑO</div>
          <div id="elix-close-owner" style="width:32px;height:32px;background:#222;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer">X</div>
        </div>
        <label class="elix-label">NOMBRE BASE</label>
        <input id="elix-base" class="elix-input" value="R" placeholder="ROYB">
        <div style="color:#777;font-size:13px;margin:8px 0">Primeras 4 letras A-Z → ROYB, KARO</div>
        <button id="elix-gen" class="elix-btn" style="background:#222;color:#fff;border:1px solid #333">Generar Código</button>
        <div class="elix-gen-box">
          <div class="elix-label">CÓDIGO GENERADO</div>
          <div id="elix-gen-code" class="elix-gen-code">ROYB-0973</div>
          <div style="color:#777;font-size:13px">ROYB-0973 • KARO-0418 • BODE-XXXX</div>
          <div style="color:#555;font-size:12px;margin-top:4px;font-family:monospace">sum*37+9281 %10000</div>
        </div>
        <div class="elix-row">
          <button id="elix-cerrar" class="elix-btn" style="background:#111;color:#fff;border:1px solid #333">Cerrar</button>
          <button id="elix-usar" class="elix-btn elix-btn-white">✓ Copiar y Usar</button>
        </div>
        <div style="color:#555;font-size:11px;text-align:center;margin-top:10px">Copiar y Usar llena el código y activa la app</div>
      </div>
    `;
    document.body.appendChild(m);
    const baseInput = m.querySelector('#elix-base');
    const codeDiv = m.querySelector('#elix-gen-code');
    const gen = () => {
      let raw = baseInput.value.toUpperCase().replace(/[^A-Z]/g,'') || 'R';
      let realBase = raw.length >=4 ? raw.slice(0,4) : (raw === 'R' ? 'ROYB' : raw.padEnd(4,'X'));
      let sum=0; for(let c of realBase) sum+=c.charCodeAt(0);
      let code = (sum*37+9281)%10000;
      codeDiv.textContent = realBase + '-' + String(code).padStart(4,'0');
    };
    m.querySelector('#elix-gen').onclick = gen;
    baseInput.oninput = gen;
    gen();
    m.querySelector('#elix-close-owner').onclick = () => m.classList.remove('open');
    m.querySelector('#elix-cerrar').onclick = () => m.classList.remove('open');
    m.querySelector('#elix-usar').onclick = () => {
      let code = codeDiv.textContent;
      localStorage.setItem('elix_license', code);
      let input = document.getElementById('elix-lic-input');
      if(input) input.value = code;
      document.getElementById('elix-activation-overlay')?.remove();
      m.classList.remove('open');
    };
  }
  let toques = 0; let timer = null;
  function handleLogoClick(){
    toques++;
    if(timer) clearTimeout(timer);
    timer = setTimeout(()=> toques = 0, 3000);
    if(toques >= 5){
      toques = 0;
      document.getElementById('elix-owner-modal')?.classList.add('open');
    }
  }
  function init(){
    const lic = localStorage.getItem('elix_license');
    const FORM = (b)=>{b=b.toUpperCase().replace(/[^A-Z]/g,'').slice(0,4).padEnd(4,'X');let s=0;for(let c of b)s+=c.charCodeAt(0);return b+'-'+String((s*37+9281)%10000).padStart(4,'0');};
    const VAL = (l)=>{if(!/^[A-Z]{4}-\d{4}$/.test(l))return false;let [b]=l.split('-');return FORM(b)===l;};
    if(!lic || !VAL(lic)){
      crearOverlay();
    }
    crearOwnerModal();
    document.addEventListener('click', (ev)=>{
      if(ev.target.closest('#elix-logo-trigger, .elix-logo-wrap')){
        handleLogoClick();
      }
    });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
